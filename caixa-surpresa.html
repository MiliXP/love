<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa Surpresa</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="pagina-carta">

        <h1>Caixa Surpresa 🎁</h1>

        <p class="mensagem">
            Clique no presente para descobrir uma surpresa.
        </p>

        <div class="presente" onclick="abrirPresente()">
            🎁
        </div>

        <div id="surpresa" class="surpresa-oculta">

            <img
                src="imagens/img5.png"
                alt="Nossa Foto"
                class="foto-surpresa"
            >

            <h2>Você é meu melhor presente ❤️</h2>

            <p>
                Entre todas as coisas boas que já aconteceram na minha vida,
                você é uma das mais especiais.
            </p>

        </div>

        <br>

        <a href="index.html" class="botao-link">
            Voltar ao Início
        </a>

    </main>

    

    <script src="js/caixa-surpresa.js"></script>

</body>
</html>
